# Cloudflare Pages configuration for PearlRate.
# The site itself is static (repo root); the only server-side piece is the
# Pages Function in functions/api/price.js, which needs the KV binding below.
name = "pearlrate"
pages_build_output_dir = "."
compatibility_date = "2025-05-29"

# KV namespace "pearlrate-price" — stores the latest PRL price.
[[kv_namespaces]]
binding = "PRICE_KV"
id = "cb93529a1f724c3a9e104350bd7c8a63"

# D1 database "pearlrate-history" — stores the full price history for the chart.
[[d1_databases]]
binding = "PRICE_DB"
database_name = "pearlrate-history"
database_id = "733d5091-4c91-48d3-b1d8-c1488f9121f0"

# NOTE: the PRICE_TOKEN secret is NOT stored here. Set it once with:
#   wrangler pages secret put PRICE_TOKEN
# or in the dashboard: Pages project -> Settings -> Variables and Secrets.
