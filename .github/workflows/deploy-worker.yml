name: Deploy price-cron Worker

# The PearlRate site (Pages) auto-deploys from Git on every push. The scheduled
# Worker in worker/ is the only piece Pages can't build, so deploy it here.
# Runs only when the Worker actually changes, on the production branch.

on:
  push:
    branches: [master]
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch: {}   # allow a manual run from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: worker
          command: deploy
